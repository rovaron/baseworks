name: Validate — docs + cross-link integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege: validator only checks out code and runs a script.
# No need for write scopes on GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  validate-docs:
    name: Run scripts/validate-docs.ts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to 1.1.x (matches CLAUDE.md `^1.1+` constraint) so future Bun
          # releases that change Bun.Glob / import.meta.main / JSON.parse error
          # message format cannot turn a green PR red without a code change.
          bun-version: "1.1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run docs validator
        run: bun run validate

  ci:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    # Kept separate from validate-docs so a failure here is attributable to the
    # code suite (lint/typecheck/test) rather than the docs validator.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Match the var names apps/api test setup + packages/config/src/env.ts expect.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to the same Bun version as validate-docs above.
          bun-version: "1.1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations
        run: bun run db:migrate

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
