[databases]
; Passthrough — NO `user=` here, so PgBouncer connects to Postgres as the CLIENT's
; user. This PRESERVES the two roles the app uses: `baseworks` (owner, via
; DATABASE_URL) and `baseworks_rls` (RLS-enforced, via DATABASE_URL_RLS). Collapsing
; both onto a single pooled user would BYPASS row-level security — never do that.
baseworks = host=postgres port=5432 dbname=baseworks

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction pooling: a server connection is returned to the pool at the end of
; each transaction, so many app connections multiplex onto a small server pool.
; Compatible with the app's per-transaction `SET app.tenant_id` RLS pattern (the
; SET lives inside the same transaction). REQUIRES DB_PREPARE=false on the app —
; postgres.js prepared statements are session-scoped and break under this mode.
pool_mode = transaction

; auth_query looks each user's password verifier up from Postgres at connect time,
; so the RLS role's secret does NOT have to be hardcoded here. `auth_user` (the
; owner/superuser) runs the query; the client's own credentials are then used to
; open the server-side session as that same user (RLS preserved). Only auth_user's
; credential lives in userlist.txt.
auth_type = scram-sha-256
auth_user = baseworks
auth_query = SELECT rolname, rolpassword FROM pg_authid WHERE rolname = $1
auth_file = /etc/pgbouncer/userlist.txt

; Sizing: cap total client connections high, keep the per-database SERVER pool small
; (that's the whole point — a handful of real Postgres connections behind hundreds
; of app ones). Tune default_pool_size to stay well under Postgres max_connections.
max_client_conn = 1000
default_pool_size = 20

; postgres.js sends extra_float_digits in its startup packet; PgBouncer must ignore
; unknown startup params in transaction mode or it rejects the connection.
ignore_startup_parameters = extra_float_digits
