services:
  postgres:
    # Tenant RLS: run `bun run db:setup-rls` BEFORE `bun run db:migrate` (migration
    # 0009 creates policies TO the baseworks_rls role, so it must exist first;
    # ALTER DEFAULT PRIVILEGES then auto-grants migrate-created tables). CI does
    # this in its DB setup step.
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: baseworks
      POSTGRES_PASSWORD: baseworks
      POSTGRES_DB: baseworks
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseworks -d baseworks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://baseworks:baseworks@postgres:5432/baseworks
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: "3000"
      INSTANCE_ROLE: api
      # Fail-closed: production boot aborts if BETTER_AUTH_SECRET is unset.
      # Local dev supplies a default via docker-compose.override.yml (T-05-01).
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set (>=32 chars, not the dev default)}
      BETTER_AUTH_URL: http://localhost:3000
      WEB_URL: http://localhost:3001
      ADMIN_URL: http://localhost:8080
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://baseworks:baseworks@postgres:5432/baseworks
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      INSTANCE_ROLE: worker
      # Fail-closed: production boot aborts if BETTER_AUTH_SECRET is unset.
      # Local dev supplies a default via docker-compose.override.yml (T-05-01).
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set (>=32 chars, not the dev default)}
      BETTER_AUTH_URL: http://api:3000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Hits the worker health server (WORKER_HEALTH_PORT, default 3001).
      # 'degraded' (Redis down / zero active workers) is treated as unhealthy.
      test:
        - "CMD"
        - "bun"
        - "-e"
        - "fetch('http://localhost:'+(process.env.WORKER_HEALTH_PORT||3001)+'/health').then(async r=>{const j=await r.json().catch(()=>({}));process.exit(r.ok&&j.status==='ok'?0:1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
